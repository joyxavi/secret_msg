
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Secret Message Sender 🔐</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

</head>

<body>


<div class="card">


<h2 class="title">🔐 Secret Message Sender</h2>


<div id="create">


<div class="field">

<textarea id="message" placeholder="Enter secret message"></textarea>

</div>


<div class="field">

<input id="password" placeholder="Enter password (optional)">

</div>


<div class="field">

<input id="expiry" type="number" placeholder="Expiry in minutes (optional)">

</div>


<div class="field">

<label>

<input type="checkbox" id="selfdestruct">

 Self destruct after reading

</label>

</div>


<button class="btn" onclick="createLink()">

Generate Secret Link

</button>


<div id="result" class="result"></div>


</div>



<div id="read" style="display:none">


<div class="field">

<input id="enterPassword" placeholder="Enter password">

</div>


<button class="btn" onclick="decode()">

Read Message

</button>


<div id="output" class="output"></div>


</div>


</div>


<script src="script.js"></script>


</body>
</html>
